<!-- HTML Front-End (Frontend/index.html)-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Credit Prediction Dashboard</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container py-5">
    <div class="text-center mb-4">
      <h1 class="fw-bold">Credit Prediction Dashboard</h1>
      <p class="text-muted">Predict credit card default risk and credit limit</p>
    </div>

    <!-- Default Prediction Form -->
    <div class="card mb-5">
      <div class="card-header bg-primary text-white">Default Risk Prediction</div>
      <div class="card-body">
        <form id="defaultPredictionForm">
          <div class="row">
            <div class="col-md-4 mb-3">
              <label for="limitBal" class="form-label">Credit Limit</label>
              <input type="number" id="limitBal" class="form-control" required>
            </div>
            <div class="col-md-4 mb-3">
              <label for="sex" class="form-label">Sex (1=Male, 2=Female)</label>
              <select id="sex" class="form-select" required>
                <option value="1">Male</option>
                <option value="2">Female</option>
              </select>
            </div>
            <div class="col-md-4 mb-3">
              <label for="education" class="form-label">Education</label>
              <select id="education" class="form-select" required>
                <option value="1">Graduate School</option>
                <option value="2">University</option>
                <option value="3">High School</option>
                <option value="4">Others</option>
              </select>
            </div>
            <div class="col-md-4 mb-3">
              <label for="marriage" class="form-label">Marital Status</label>
              <select id="marriage" class="form-select" required>
                <option value="1">Married</option>
                <option value="2">Single</option>
                <option value="3">Other</option>
              </select>
            </div>
            <div class="col-md-4 mb-3">
              <label for="age" class="form-label">Age</label>
              <input type="number" id="age" class="form-control" required>
            </div>
            <div class="col-md-4 mb-3">
              <label for="billAmtAvg" class="form-label">Average Bill Amount</label>
              <input type="number" id="billAmtAvg" class="form-control" required>
            </div>
            <div class="col-md-4 mb-3">
              <label for="payAmtAvg" class="form-label">Average Payment Amount</label>
              <input type="number" id="payAmtAvg" class="form-control" required>
            </div>
            <div class="col-md-4 mb-3">
              <label for="paymentStatus" class="form-label">Payment Status</label>
              <select id="paymentStatus" class="form-select" required>
                <option value="-1">No credit consumption</option>
                <option value="0">Paid in full</option>
                <option value="1">1 month delay</option>
                <option value="2">2 months delay</option>
                <option value="3">3 months delay</option>
                <option value="4">4 months delay</option>
                <option value="5">5 months delay</option>
                <option value="6">6 months delay</option>
                <option value="7">7 months delay</option>
                <option value="8">8 months delay</option>
              </select>
            </div>
          </div>
          <button type="submit" class="btn btn-primary">Predict Default Risk</button>
        </form>
        <div id="defaultResult" class="mt-3"></div>
      </div>
    </div>

    <!-- Credit Limit Prediction Form -->
    <div class="card">
      <div class="card-header bg-success text-white">Credit Limit Prediction</div>
      <div class="card-body">
        <form id="creditLimitForm">
          <div class="row">
            <div class="col-md-4 mb-3">
              <label for="climitBal" class="form-label">Current Credit Limit</label>
              <input type="number" id="climitBal" class="form-control" required>
            </div>
            <div class="col-md-4 mb-3">
              <label for="csex" class="form-label">Sex (1=Male, 2=Female)</label>
              <select id="csex" class="form-select" required>
                <option value="1">Male</option>
                <option value="2">Female</option>
              </select>
            </div>
            <div class="col-md-4 mb-3">
              <label for="ceducation" class="form-label">Education</label>
              <select id="ceducation" class="form-select" required>
                <option value="1">Graduate School</option>
                <option value="2">University</option>
                <option value="3">High School</option>
                <option value="4">Others</option>
              </select>
            </div>
            <div class="col-md-4 mb-3">
              <label for="cmarriage" class="form-label">Marital Status</label>
              <select id="cmarriage" class="form-select" required>
                <option value="1">Married</option>
                <option value="2">Single</option>
                <option value="3">Other</option>
              </select>
            </div>
            <div class="col-md-4 mb-3">
              <label for="cage" class="form-label">Age</label>
              <input type="number" id="cage" class="form-control" required>
            </div>
            <div class="col-md-4 mb-3">
              <label for="cbillAmtAvg" class="form-label">Average Bill Amount</label>
              <input type="number" id="cbillAmtAvg" class="form-control" required>
            </div>
            <div class="col-md-4 mb-3">
              <label for="cpayAmtAvg" class="form-label">Average Payment Amount</label>
              <input type="number" id="cpayAmtAvg" class="form-control" required>
            </div>
            <div class="col-md-4 mb-3">
              <label for="cpaymentStatus" class="form-label">Payment Status</label>
              <select id="cpaymentStatus" class="form-select" required>
                <option value="-1">No credit consumption</option>
                <option value="0">Paid in full</option>
                <option value="1">1 month delay</option>
                <option value="2">2 months delay</option>
                <option value="3">3 months delay</option>
                <option value="4">4 months delay</option>
                <option value="5">5 months delay</option>
                <option value="6">6 months delay</option>
                <option value="7">7 months delay</option>
                <option value="8">8 months delay</option>
              </select>
            </div>
          </div>
          <button type="submit" class="btn btn-success">Predict Credit Limit</button>
        </form>
        <div id="creditLimitResult" class="mt-3"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/scripts.js"></script>
</body>
</html>
